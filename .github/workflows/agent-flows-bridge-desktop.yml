name: agent-flows-bridge-desktop

on:
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/agent-flows-bridge-desktop.yml"
  push:
    branches:
      - main
    paths:
      - "desktop/**"
      - ".github/workflows/agent-flows-bridge-desktop.yml"

jobs:
  desktop:
    name: Desktop Tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "desktop/package-lock.json"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri"

      - name: Install Desktop Dependencies
        working-directory: desktop
        run: npm ci

      - name: Run Desktop Vitest
        working-directory: desktop
        run: npm test

      - name: Run Desktop Cargo Tests
        working-directory: desktop/src-tauri
        run: cargo test

      - name: Run Desktop Cargo Check
        working-directory: desktop/src-tauri
        run: cargo check
