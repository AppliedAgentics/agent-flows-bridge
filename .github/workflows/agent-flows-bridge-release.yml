name: Agent Flows Bridge Release

on:
  push:
    tags:
      - "v20*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14

    steps:
      - name: Checkout bridge repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag format
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          [[ "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]

      - name: Ensure tag points at main
        shell: bash
        run: |
          git fetch origin main --depth=50
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Switch to main for metadata pushes
        shell: bash
        run: |
          git switch -C main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Run release script unit tests
        run: python3 -m unittest scripts.test_release_macos

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: AppliedAgentics/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Configure tap git identity
        working-directory: homebrew-tap
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish GitHub release and tap update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/release_macos.py \
            --tap-dir "${GITHUB_WORKSPACE}/homebrew-tap" \
            --version "${{ steps.version.outputs.version }}"
