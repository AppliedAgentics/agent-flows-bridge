name: Agent Flows Bridge Release

on:
  push:
    tags:
      - "v20*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14

    steps:
      - name: Checkout bridge repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag format
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          [[ "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]

      - name: Ensure tag points at main
        shell: bash
        run: |
          git fetch origin main --depth=50
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Switch to main for metadata pushes
        shell: bash
        run: |
          git switch -C main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Run release script unit tests
        run: python3 -m unittest scripts.test_release_macos

      - name: Validate Apple signing secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        shell: bash
        run: |
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_SIGNING_IDENTITY"
          test -n "$APPLE_API_ISSUER"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_P8_BASE64"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          runner_temp = Path(os.environ["RUNNER_TEMP"])
          key_id = os.environ["APPLE_API_KEY"]
          key_path = runner_temp / f"AuthKey_{key_id}.p8"
          key_path.write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_P8_BASE64"]))
          key_path.chmod(0o600)

          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"APPLE_API_KEY_PATH={key_path}\n")
          PY

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: AppliedAgentics/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Configure tap git identity
        working-directory: homebrew-tap
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish GitHub release and tap update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          python3 scripts/release_macos.py \
            --tap-dir "${GITHUB_WORKSPACE}/homebrew-tap" \
            --version "${{ steps.version.outputs.version }}"
